image: maven:3-eclipse-temurin-17

stages:
  - deploy

variables:
  SERVER_IP: "167.235.62.116"
  SERVER_USER: "eric"
  # Sur le serveur, ce chemin doit être absolu
  PROJECT_PATH: "/home/eric/union-gate/frontend"
  DOCKER_IMAGE_NAME: "union-gate-frontend"
  DOCKER_CONTAINER_NAME: "union-gate-frontend-container"
  DOCKER_PORT: "3000"  # Port interne de votre application
  HOST_PORT: "3000"    # Port exposé sur le serveur

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache lsof
    - apk add --no-cache openssh-client sshpass git
    - mkdir -p ~/.ssh
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - |
      sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP << EOF
      set -e
      set -x
      echo "📂 Positionnement dans le projet..."
      # Si le dossier n'est pas un repo Git, on clone
      if [ ! -d "$PROJECT_PATH/.git" ]; then
        echo "🚧 Repo absent ou non initialisé, clonage..."
        git clone https://$GIT_USERNAME:$GIT_PASSWORD@gitlab.com/union-gate/backend.git $PROJECT_PATH
      fi
      cd $PROJECT_PATH

      echo "🔄 Récupération des dernières modifications..."
      git pull origin master
      kill $(lsof -t -i:3000) 2>/dev/null || true
      npm run dev

      
      EOF

  only:
    - master
